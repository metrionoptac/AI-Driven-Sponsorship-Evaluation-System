<!DOCTYPE html>
<html lang="en" x-data="{ sidebarOpen: true, copilotOpen: false }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} - Sponsorship Evaluator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/css/app.css?v=20260412b">
    <script src="/static/js/i18n.js?v=20260707b"></script>
    <script>
        const DE = {
            state: {
                received:'Received', ingested:'Received', extracted:'Extracted',
                eligible:'Eligible', evaluated:'Evaluated', recommended:'Recommended',
                human_review:'Review', decided:'Decided', completed:'Completed',
                rejected:'Rejected', approved:'Approved', deferred:'Deferred',
                failed:'Failed', draft_ready:'Draft Ready', sent:'Sent',
            },
            decision: {
                APPROVED:'Approved', REJECTED:'Rejected', PARTIAL:'Put on Hold',
                approved:'Approved', rejected:'Rejected', conditionally_approved:'Put on Hold',
                pending:'Pending',
            },
            stateLabel(s) { return DE.state[s] || s; },
            decisionLabel(d) { return DE.decision[d] || d; },
        };
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },
                        accent: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d' },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="bg-primary-800 text-white flex flex-col transition-all duration-300"
           :class="sidebarOpen ? 'w-56' : 'w-14'">
        <div class="p-3 border-b border-primary-700 flex items-center gap-2">
            <div class="w-8 h-8 bg-accent-500 rounded-lg flex items-center justify-center font-bold text-sm flex-shrink-0">SE</div>
            <span x-show="sidebarOpen" x-transition class="font-semibold text-sm whitespace-nowrap" x-text="t('nav.app_name')">Sponsorship AI</span>
        </div>
        <nav class="flex-1 p-2 space-y-1">
            <a href="/dashboard" class="nav-link {% block nav_overview %}{% endblock %}">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
                <span x-show="sidebarOpen" x-transition x-text="t('nav.dashboard')">Dashboard</span>
            </a>
            <a href="/dashboard/requests" class="nav-link {% block nav_requests %}{% endblock %}">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                <span x-show="sidebarOpen" x-transition x-text="t('nav.requests')">Requests</span>
            </a>
            <a href="/dashboard/live" class="nav-link {% block nav_live %}{% endblock %}">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                <span x-show="sidebarOpen" x-transition x-text="t('nav.live')">Live Monitoring</span>
            </a>
            <a href="/dashboard/config" class="nav-link {% block nav_config %}{% endblock %}">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span x-show="sidebarOpen" x-transition x-text="t('nav.config')">Configuration</span>
            </a>
        </nav>
        <button @click="sidebarOpen = !sidebarOpen" class="p-3 border-t border-primary-700 hover:bg-primary-700 transition">
            <svg class="w-5 h-5 mx-auto transition-transform" :class="sidebarOpen ? '' : 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
        </button>
    </aside>

    <!-- Main content -->
    <div class="flex-1 flex flex-col min-w-0">
        <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
            <h1 class="text-lg font-semibold text-gray-800">{% block page_title %}Dashboard{% endblock %}</h1>
            <div class="flex items-center gap-2">
                <button onclick="toggleLang()" :title="t('lang.tooltip')"
                        class="inline-flex items-center gap-1 px-2.5 py-1.5 border-2 border-gray-300 text-sm font-bold rounded-lg hover:bg-gray-100 transition"
                        :class="getLang() === 'de' ? 'border-amber-400 bg-amber-50 text-amber-700' : 'text-gray-600'">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/></svg>
                    <span x-text="t('lang.switch')"></span>
                </button>
                <button @click="copilotOpen = !copilotOpen"
                        class="inline-flex items-center gap-2 px-3 py-1.5 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    <span x-text="t('copilot.title')">Ask Me</span>
                </button>
            </div>
        </header>
        <main class="flex-1 overflow-auto p-6">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Copilot Chat Panel -->
    <div x-show="copilotOpen" x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full"
         class="fixed right-0 top-0 h-full w-96 bg-white border-l border-gray-200 shadow-xl flex flex-col z-50">
        <div class="px-4 py-3 bg-primary-600 text-white flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                <span class="font-semibold text-sm" x-text="t('copilot.title')">Ask Me</span>
            </div>
            <div class="flex items-center gap-1">
                <button id="copilot-clear" class="hover:bg-primary-700 rounded p-1 transition" title="Clear chat">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
                <button @click="copilotOpen = false" class="hover:bg-primary-700 rounded p-1 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
        <div id="copilot-messages" class="flex-1 overflow-y-auto p-4 space-y-3">
            <div class="bg-primary-50 rounded-lg p-3 text-sm text-primary-800">
                <span x-text="t('copilot.greeting')">Hi! Ask me anything about requests, budgets, evaluations, or any data in the system.</span>
            </div>
        </div>
        <div class="border-t border-gray-200 p-3">
            <form id="copilot-form" class="flex gap-2" onsubmit="return false;">
                <input id="copilot-input" type="text" :placeholder="t('copilot.placeholder')"
                       class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                       autocomplete="off">
                <button type="submit" id="copilot-send"
                        class="bg-primary-600 text-white px-3 py-2 rounded-lg hover:bg-primary-700 transition text-sm">
                    <span x-text="t('copilot.send')">Send</span>
                </button>
            </form>
        </div>
    </div>

    <script src="/static/js/copilot.js?v=20260412b"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
