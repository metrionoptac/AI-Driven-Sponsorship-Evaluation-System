version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: sponsorship_db
      POSTGRES_USER: sponsorship
      POSTGRES_PASSWORD: sponsorship
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sponsorship -d sponsorship_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://sponsorship:sponsorship@db:5432/sponsorship_db"
      DATABASE_MIN_POOL_SIZE: "3"
      DATABASE_MAX_POOL_SIZE: "10"
      LLM_ANTHROPIC_API_KEY: "${LLM_ANTHROPIC_API_KEY}"
      LLM_OPENAI_API_KEY: "${LLM_OPENAI_API_KEY:-}"
      SMTP_ENABLED: "${SMTP_ENABLED:-false}"
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      INTAKE_RAW_DOC_STORAGE_PATH: "/app/documents/raw"
    volumes:
      - documents:/app/documents
      - logs:/app/logs

volumes:
  pgdata:
  documents:
  logs:
